server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Ne pas mettre en cache config.json (contient les URLs d'env)
    location = /assets/config.json {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Cache long pour les assets statiques Angular (hachés)
    location ~* \.(js|css|woff|woff2|ttf|eot|ico|svg|png|jpg|jpeg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA : fallback vers index.html pour le routing Angular
    location / {
        try_files $uri $uri/ /index.html;
    }
}
