server {
    listen 80;
    server_name auth.namorama.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name auth.namorama.com;

    ssl_certificate     /etc/letsencrypt/live/namorama.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/namorama.com/privkey.pem;

    # Buffers élargis pour les tokens Keycloak
    proxy_buffer_size       128k;
    proxy_buffers           4 256k;
    proxy_busy_buffers_size 256k;

    location / {
        proxy_pass http://127.0.0.1:8084;
        proxy_redirect http://127.0.0.1:8084/ $scheme://$http_host/;
        proxy_http_version 1.1;
        proxy_read_timeout 20d;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }
}
