server {
    listen 80;
    server_name api.namorama.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.namorama.com;

    ssl_certificate     /etc/letsencrypt/live/namorama.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/namorama.com/privkey.pem;

    # Pas de limite de taille (uploads, webhooks Stripe)
    client_max_body_size 0;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming SSE (recherche de domaines)
        proxy_read_timeout     300s;
        proxy_buffering        off;
        proxy_cache            off;
    }
}
